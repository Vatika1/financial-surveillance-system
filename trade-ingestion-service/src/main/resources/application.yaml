server:
  port: 8081

spring:
  application:
    name: trade-ingestion-service

  datasource:
    url: jdbc:postgresql://localhost:5432/surveillance?currentSchema=trade_ingestion
    username: surveillance
    password: surveillance123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: trade_ingestion
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

kafka:
  topics:
    trades-raw: trades.raw
    audit-events: audit.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.financialsurveillance: DEBUG
    org.springframework.kafka: INFO
    org.flywaydb: INFO