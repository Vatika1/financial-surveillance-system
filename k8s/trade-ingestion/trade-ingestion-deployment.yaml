apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-ingestion-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trade-ingestion-service
  template:
    metadata:
      labels:
        app: trade-ingestion-service
    spec:
      containers:
        - name: trade-ingestion-service
          image: 674326380423.dkr.ecr.us-east-1.amazonaws.com/surveillance-prod/trade-ingestion-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://surveillance-prod-db.ccfkou6gmo5z.us-east-1.rds.amazonaws.com:5432/surveillance?currentSchema=trade_ingestion"
            - name: SPRING_DATASOURCE_USERNAME
              value: "surveillance"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "b-1.surveillanceprod.ppyzep.c13.kafka.us-east-1.amazonaws.com:9094,b-2.surveillanceprod.ppyzep.c13.kafka.us-east-1.amazonaws.com:9094"
          resources:
            requests:
              memory: "768Mi"
              cpu: "250m"
            limits:
              memory: "1280Mi"
              cpu: "750m"