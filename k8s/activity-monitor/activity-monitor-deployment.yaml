apiVersion: apps/v1
kind: Deployment
metadata:
  name: activity-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activity-monitor
  template:
    metadata:
      labels:
        app: activity-monitor
    spec:
      containers:
        - name: activity-monitor
          image: activity-monitor-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/surveillance"
            - name: SPRING_DATASOURCE_USERNAME
              value: "surveillance"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "surveillance123"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"