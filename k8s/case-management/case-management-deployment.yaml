apiVersion: apps/v1
kind: Deployment
metadata:
  name: case-management-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: case-management-service
  template:
    metadata:
      labels:
        app: case-management-service
    spec:
      containers:
        - name: case-management-service
          image: case-management-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/surveillance"
            - name: SPRING_DATASOURCE_USERNAME
              value: "surveillance"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "surveillance123"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"