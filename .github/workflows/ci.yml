name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      service:
        description: 'Which service to build and push?'
        required: true
        type: choice
        options:
          - all
          - trade-ingestion-service
          - activity-monitor-service
          - alert-service

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test --batch-mode

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all services (skip tests — already ran)
        run: mvn package -DskipTests --batch-mode
      - name: SonarCloud analysis -Dsonar.projectKey=Vatika1_financial-surveillance-system -Dsonar.organization=vatika1 -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push trade-ingestion-service
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'trade-ingestion-service' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: trade-ingestion-service/Dockerfile
          push: true
          tags: vatika1/trade-ingestion-service:latest

      - name: Build & push activity-monitor-service
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'activity-monitor-service' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: activity-monitor-service/Dockerfile
          push: true
          tags: vatika1/activity-monitor-service:latest

      - name: Build & push alert-service
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'alert-service' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: alert-service/Dockerfile
          push: true
          tags: vatika1/alert-service:latest