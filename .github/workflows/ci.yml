name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      service:
        description: 'Which service to build and deploy?'
        required: true
        type: choice
        options:
          - all
          - trade-ingestion-service
          - activity-monitor-service
          - alert-service
          - case-management-service

# Required for OIDC authentication with AWS
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 674326380423.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: surveillance-prod

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test --batch-mode

  build-and-deploy:
    name: Build, Push to ECR, Deploy to EKS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all services (skip tests, already ran)
        run: mvn package -DskipTests --batch-mode

      - name: SonarCloud analysis
        run: mvn verify sonar:sonar -DskipTests=false -Dsonar.projectKey=Vatika1_financial-surveillance-system -Dsonar.organization=vatika1 -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::674326380423:role/GitHubActionsDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag (git SHA)
        id: image-tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # -----------------------------
      # Build & push images to ECR
      # -----------------------------
      - name: Build & push trade-ingestion-service
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'trade-ingestion-service' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: trade-ingestion-service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/surveillance-prod/trade-ingestion-service:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/surveillance-prod/trade-ingestion-service:latest

      - name: Build & push activity-monitor-service
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'activity-monitor-service' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: activity-monitor-service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/surveillance-prod/activity-monitor-service:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/surveillance-prod/activity-monitor-service:latest

      - name: Build & push alert-service
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'alert-service' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: alert-service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/surveillance-prod/alert-service:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/surveillance-prod/alert-service:latest

      - name: Build & push case-management-service
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'case-management-service' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: case-management-service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/surveillance-prod/case-management-service:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/surveillance-prod/case-management-service:latest

      # -----------------------------
      # Deploy to EKS
      # -----------------------------
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy trade-ingestion-service to EKS
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'trade-ingestion-service' }}
        run: |
          kubectl set image deployment/trade-ingestion-service \
            trade-ingestion-service=${{ env.ECR_REGISTRY }}/surveillance-prod/trade-ingestion-service:${{ env.IMAGE_TAG }}
          kubectl rollout status deployment/trade-ingestion-service --timeout=5m

      - name: Deploy activity-monitor-service to EKS
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'activity-monitor-service' }}
        run: |
          kubectl set image deployment/activity-monitor-service \
            activity-monitor-service=${{ env.ECR_REGISTRY }}/surveillance-prod/activity-monitor-service:${{ env.IMAGE_TAG }}
          kubectl rollout status deployment/activity-monitor-service --timeout=5m

      - name: Deploy alert-service to EKS
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'alert-service' }}
        run: |
          kubectl set image deployment/alert-service \
            alert-service=${{ env.ECR_REGISTRY }}/surveillance-prod/alert-service:${{ env.IMAGE_TAG }}
          kubectl rollout status deployment/alert-service --timeout=5m

      - name: Deploy case-management-service to EKS
        if: ${{ github.event_name == 'push' || inputs.service == 'all' || inputs.service == 'case-management-service' }}
        run: |
          kubectl set image deployment/case-management-service \
            case-management-service=${{ env.ECR_REGISTRY }}/surveillance-prod/case-management-service:${{ env.IMAGE_TAG }}
          kubectl rollout status deployment/case-management-service --timeout=5m