server:
  port: 8082

spring:
  application:
    name: activity-monitor-service
  profiles:
    active: local

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: activity_monitor
    baseline-on-migrate: true

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

    consumer:
      group-id: activity-monitor-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.financialsurveillance.events"
        spring.json.value.default.type: "com.financialsurveillance.events.TradeCreatedEvent"

    listener:
      ack-mode: manual
      concurrency: 3

kafka:
  topics:
    trades-raw: trades.raw
    alerts-created: alerts.created

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: WARN
    com.financialsurveillance: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: INFO
    org.hibernate: WARN
    org.flywaydb: INFO